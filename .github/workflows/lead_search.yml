name: Lead Search Trigger

on:
  workflow_dispatch:
    inputs:
      queries:
        description: 'Search queries as a Python list string (e.g. "[\x27software company\x27]")'
        required: true
        type: string
      locations:
        description: 'Locations as a Python list string (e.g. "[\x27Amsterdam\x27]")'
        required: false
        default: '[]'
        type: string
      limit:
        description: 'Max results per query'
        required: false
        default: '50'
        type: string

jobs:
  run-scraper:
    runs-on: ubuntu-latest
    
    steps:
      - uses: actions/checkout@v4
      
      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: "3.10"
          
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r trend_engine/requirements.txt
          pip install playwright playwright-stealth
          playwright install chromium --with-deps
          
      - name: Run Scraper
        run: |
          python trend_engine/scrapers/lead_search.py \
            --queries "${{ github.event.inputs.queries }}" \
            --locations "${{ github.event.inputs.locations }}" \
            --limit "${{ github.event.inputs.limit }}" \
            --output "lead_search_results.csv"
            
      - name: Upload results artifact
        uses: actions/upload-artifact@v4
        with:
          name: lead-search-results
          path: lead_search_results.csv
